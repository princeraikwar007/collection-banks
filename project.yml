# XcodeGen spec for Finance Tracker.
# Run `xcodegen generate` (or let Codemagic do it) to produce
# `FinanceTracker.xcodeproj` from this file plus the sources in this repo.
#
# Assumes a FLAT repo layout: the .swift folders (Models, Views, Services,
# Utilities, Resources) sit at the repo root next to project.yml. If instead
# everything is nested under a `FinanceTracker/` folder, replace each `path:`
# below with `FinanceTracker/<folder>`.
#
# Docs: https://github.com/yonaskolb/XcodeGen

name: FinanceTracker

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  FinanceTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: FinanceTrackerApp.swift
      - path: Models
      - path: Views
      - path: Services
      - path: Utilities
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.financetracker
        PRODUCT_NAME: FinanceTracker
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/FinanceTracker.entitlements
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    # No `info:` block — INFOPLIST_FILE above points to the checked-in plist.
