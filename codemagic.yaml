# codemagic.yaml — Finance Tracker (offline iOS app)
#
# Active workflow:
#   * ios-simulator-build — unsigned build + tests on iOS Simulator.
#     Requires NO Apple Developer account, NO certificates, NO App Store
#     Connect API keys. Good for verifying the code compiles on every push.
#
# When you're ready to ship to TestFlight later, generate an App Store
# Connect API key (Users and Access → Integrations → App Store Connect API
# in App Store Connect), add it to a Codemagic environment group named
# `app_store_credentials`, then uncomment the `ios-testflight` workflow at
# the bottom of this file.
#
# Prerequisite: this repo must contain an Xcode project or workspace.
# The Swift sources ship without one, so either:
#   * open Xcode once, create the FinanceTracker app target, drag the sources
#     in, and commit `FinanceTracker.xcodeproj`, OR
#   * add an XcodeGen `project.yml` and let the workflow generate the project
#     (uncomment the `xcodegen generate` script step below).

definitions:
  env_versions: &env_versions
    xcode: latest        # or pin to a specific one Codemagic lists, e.g. 16.2
    cocoapods: default
  cache_paths: &cache_paths
    - $HOME/Library/Caches/CocoaPods
    - $HOME/Library/Developer/Xcode/DerivedData
    - $HOME/Library/Caches/org.swift.swiftpm

workflows:

  ios-simulator-build:
    name: iOS Simulator Build & Test
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      <<: *env_versions
      vars:
        XCODE_PROJECT: "FinanceTracker.xcodeproj"
        XCODE_SCHEME: "FinanceTracker"
    cache:
      cache_paths: *cache_paths
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
    scripts:
      - name: Show Xcode & Swift versions
        script: |
          xcodebuild -version
          swift --version

      # Uncomment if you use XcodeGen to generate the project from project.yml:
      - name: Generate Xcode project with XcodeGen
        script: |
          set -e

          echo "=== Repo layout (top level) ==="
          ls -la

          echo "=== All Swift files ==="
          find . -type f -name "*.swift" | sort

          echo "=== Locating FinanceTrackerApp.swift ==="
          APP_SWIFT=$(find . -type f -name "FinanceTrackerApp.swift" | head -1)
          if [ -z "$APP_SWIFT" ]; then
            echo "ERROR: FinanceTrackerApp.swift not found anywhere in the checkout."
            echo "Make sure the Swift sources are actually committed to the repo."
            exit 1
          fi
          SRC_DIR=$(cd "$(dirname "$APP_SWIFT")" && pwd)
          REPO_ROOT=$(pwd)
          REL=$(python3 -c "import os,sys;print(os.path.relpath(sys.argv[1], sys.argv[2]))" "$SRC_DIR" "$REPO_ROOT")
          echo "Sources rooted at: $REL"

          echo "=== Locating Info.plist ==="
          INFO_PLIST=$(find . -type f -name "Info.plist" | head -1)
          if [ -z "$INFO_PLIST" ]; then
            echo "ERROR: Info.plist not found in checkout."
            exit 1
          fi
          INFO_REL=$(python3 -c "import os,sys;print(os.path.relpath(sys.argv[1], sys.argv[2]))" "$INFO_PLIST" "$REPO_ROOT")
          echo "Info.plist: $INFO_REL"

          ENT_PLIST=""   # sideloading tools inject their own; skip our entitlements
          if [ -n "$ENT_PLIST" ]; then
            ENT_REL=$(python3 -c "import os,sys;print(os.path.relpath(sys.argv[1], sys.argv[2]))" "$ENT_PLIST" "$REPO_ROOT")
            ENT_LINE="        CODE_SIGN_ENTITLEMENTS: $ENT_REL"
          else
            ENT_LINE=""
          fi

          echo "=== Writing dynamic project.yml ==="
          cat > project.yml <<EOF
          name: FinanceTracker
          options:
            bundleIdPrefix: com.example
            deploymentTarget:
              iOS: "17.0"
            createIntermediateGroups: true
          settings:
            base:
              SWIFT_VERSION: "5.9"
              DEVELOPMENT_TEAM: ""
              CODE_SIGN_STYLE: Automatic
              ENABLE_USER_SCRIPT_SANDBOXING: NO
          targets:
            FinanceTracker:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources:
                - path: $REL
                  excludes:
                    - "**/Info.plist"
                    - "**/*.entitlements"
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.example.financetracker
                  PRODUCT_NAME: FinanceTracker
                  INFOPLIST_FILE: $INFO_REL
          $ENT_LINE
                  GENERATE_INFOPLIST_FILE: NO
                  TARGETED_DEVICE_FAMILY: "1,2"
                  SUPPORTS_MACCATALYST: NO
          EOF

          cat project.yml

          echo "=== Installing XcodeGen ==="
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

          echo "=== Generating Xcode project ==="
          xcodegen generate

          echo "=== Result ==="
          ls -la FinanceTracker.xcodeproj

      - name: Resolve Swift Package dependencies
        script: |
          if [ -d "$XCODE_PROJECT" ]; then
            xcodebuild -resolvePackageDependencies -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" || true
          fi

      - name: Build unsigned .ipa for iPhone (sideload with Sideloadly / AltStore)
        script: |
          set -o pipefail
          BUILD_DIR="$CM_BUILD_DIR/build"
          mkdir -p "$BUILD_DIR"

          # 1. Build for the physical-device SDK with code signing fully off.
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CONFIGURATION_BUILD_DIR="$BUILD_DIR" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build | xcpretty

          # 2. Locate the built .app.
          APP_PATH=$(find "$BUILD_DIR" -maxdepth 2 -type d -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: no .app produced under $BUILD_DIR"
            find "$BUILD_DIR" -maxdepth 3
            exit 1
          fi
          echo "Built app: $APP_PATH"

          # 3. Wrap in the standard Payload/ folder and zip as .ipa.
          PACK_DIR="$CM_BUILD_DIR/ipa_pack"
          rm -rf "$PACK_DIR"
          mkdir -p "$PACK_DIR/Payload"
          cp -R "$APP_PATH" "$PACK_DIR/Payload/"
          (cd "$PACK_DIR" && zip -qr "$CM_BUILD_DIR/FinanceTracker-unsigned.ipa" Payload)

          ls -lh "$CM_BUILD_DIR/FinanceTracker-unsigned.ipa"
          echo "Download this .ipa, then sign+install with Sideloadly or AltStore."

      - name: Run unit tests (if any test target exists)
        script: |
          set -o pipefail
          if ! xcodebuild -list -project "$XCODE_PROJECT" | grep -q "Tests"; then
            echo "No test target detected — skipping tests."
            exit 0
          fi

          # Pick the first available iPhone simulator on this image.
          SIM_LINE=$(xcrun simctl list devices available \
                     | grep -E "iPhone [0-9]+" \
                     | head -1)
          if [ -z "$SIM_LINE" ]; then
            echo "No iPhone simulator available — skipping tests."
            exit 0
          fi
          SIM_UDID=$(echo "$SIM_LINE" | grep -oE "[A-F0-9-]{36}" | head -1)
          echo "Testing on simulator: $SIM_LINE"

          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -destination "platform=iOS Simulator,id=$SIM_UDID" \
            CODE_SIGNING_ALLOWED=NO | xcpretty
    artifacts:
      - FinanceTracker-unsigned.ipa
      - build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.log
    publishing:
      email:
        recipients:
          - your.email@example.com
        notify:
          success: false
          failure: true

